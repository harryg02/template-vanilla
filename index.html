<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Vanilla JS Template</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="container">
    <div class="row">
      <h1 class="col">Vanilla Template</h1>
    </div>
  </header>
  <main class="container">

    Main Content
    <div class="row">
      <div class="card mb-4">
        <div class="card-body">
          <h2 class="card-title">Name: Harry Gu, Uniqname: harrygu</h2>
          <p>Click the button to move an item from the left side to the right side.</p>

          <div class="row">
            <div class="col col-sm-5">
              <ul class="p1-list" id="start-list">
                <li>🍔</li>
                <li>🌮</li>
                <li>🍕</li>
                <li>🍿</li>
                <li>🍎</li>
                <li>🍟</li>
              </ul>
            </div>
            <div class="col col-sm-2">
              <button id="move-the-items" class="btn btn-primary">Move Items</button>
            </div>
            <div class="col col-sm-5">
              <ul class="p1-list" id="end-list"></ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="js/script.js" defer></script>
</body>

</html>
